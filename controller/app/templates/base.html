<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VPS UFW Firewall Manager{% endblock %}</title>
  <meta name="description" content="Centralized UFW firewall management for edge relays">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Immediately read theme to prevent flash of light screen -->
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body hx-headers='{"X-Requested-With": "htmx"}'>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="icon">🛡️</span>
      <span>Firewall Console</span>
    </div>
    <ul class="nav-links">
      <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">📊 仪表盘</a></li>
      <li><a href="/ip-manage" class="{% if active_page == 'ip_manage' %}active{% endif %}">🏷️ IP 管理</a></li>
      <li><a href="/nodes/manage" class="{% if active_page == 'nodes_manage' %}active{% endif %}">🖥️ 节点管理</a></li>
      <li><a href="/logs" class="{% if active_page == 'logs' %}active{% endif %}">📋 操作日志</a></li>
    </ul>
    <div class="nav-spacer"></div>
    <button id="theme-toggle" class="btn btn-ghost btn-sm btn-icon" title="切换主题" style="border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; padding: 0;">
      🌙
    </button>
  </nav>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Main Content -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast Handler -->
  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toast-out 300ms ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Listen for HTMX responses that contain toasts
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      const toastEl = evt.detail.target.querySelector('.toast-trigger');
      if (toastEl) {
        showToast(toastEl.dataset.message, toastEl.dataset.type || 'success');
        toastEl.remove();
      }
    });

    // Also handle toast partials rendered into #toast-container
    document.body.addEventListener('htmx:afterSettle', function(evt) {
      document.querySelectorAll('.toast-trigger').forEach(el => {
        showToast(el.dataset.message, el.dataset.type || 'success');
        el.remove();
      });
    });
  </script>

  <!-- Copy to clipboard -->
  <script>
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.textContent;
        btn.textContent = '✓ 已复制';
        setTimeout(() => btn.textContent = original, 2000);
      });
    }

    function copyCodeBlock(btn) {
      const block = btn.closest('.code-block');
      const code = block.querySelector('code') || block;
      const text = code.textContent.trim();
      copyToClipboard(text, btn);
    }
  </script>

  <!-- Theme Toggle Handler -->
  <script>
    (function() {
      const toggleBtn = document.getElementById('theme-toggle');
      if (!toggleBtn) return;
      
      function updateToggleIcon() {
        if (document.documentElement.classList.contains('dark')) {
          toggleBtn.textContent = '☀️';
        } else {
          toggleBtn.textContent = '🌙';
        }
      }
      
      // Sync icon on mount
      updateToggleIcon();
      
      toggleBtn.addEventListener('click', () => {
        if (document.documentElement.classList.contains('dark')) {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        }
        updateToggleIcon();
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
