<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Snell UFW Manager{% endblock %}</title>
  <meta name="description" content="Centralized UFW firewall management for Snell proxy nodes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body hx-headers='{"X-Requested-With": "htmx"}'>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="icon">🔒</span>
      <span>Snell UFW</span>
    </div>
    <ul class="nav-links">
      <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">📊 仪表盘</a></li>
      <li><a href="/relay-groups" class="{% if active_page == 'relay_groups' %}active{% endif %}">🔗 中转组</a></li>
      <li><a href="/nodes/manage" class="{% if active_page == 'nodes_manage' %}active{% endif %}">🖥️ 节点管理</a></li>
      <li><a href="/logs" class="{% if active_page == 'logs' %}active{% endif %}">📋 操作日志</a></li>
    </ul>
    <div class="nav-spacer"></div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
      <span id="theme-icon">🌙</span>
    </button>
  </nav>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Main Content -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- Theme Toggle Script -->
  <script>
    function getTheme() {
      return localStorage.getItem('theme') || 'dark';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('theme-icon').textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
      const current = getTheme();
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    // Apply saved theme on load
    applyTheme(getTheme());
  </script>

  <!-- Toast Handler -->
  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'toast-out 300ms ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Listen for HTMX responses that contain toasts
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      const toastEl = evt.detail.target.querySelector('.toast-trigger');
      if (toastEl) {
        showToast(toastEl.dataset.message, toastEl.dataset.type || 'success');
        toastEl.remove();
      }
    });

    // Also handle toast partials rendered into #toast-container
    document.body.addEventListener('htmx:afterSettle', function(evt) {
      document.querySelectorAll('.toast-trigger').forEach(el => {
        showToast(el.dataset.message, el.dataset.type || 'success');
        el.remove();
      });
    });
  </script>

  <!-- Copy to clipboard -->
  <script>
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.textContent;
        btn.textContent = '✓ 已复制';
        setTimeout(() => btn.textContent = original, 2000);
      });
    }

    function copyCodeBlock(btn) {
      const block = btn.closest('.code-block');
      const code = block.querySelector('code') || block;
      const text = code.textContent.trim();
      copyToClipboard(text, btn);
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
