{% if toast %}
<div class="toast-trigger hidden"
     data-message="{{ toast.message }}"
     data-type="{{ toast.type | default('success') }}">
</div>
{% endif %}

<div id="port-cards-grid" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
  {% for port_num, data in port_data.items() %}
    {% include "partials/port_card.html" %}
  {% else %}
    <div class="empty-state" style="width: 100%; padding: 48px 24px; text-align: center; color: var(--text-muted);">
      <p>当前节点无额外放行端口规则（或 UFW 为关闭状态）</p>
    </div>
  {% endfor %}
</div>

{% if ip_groups is defined and ip_groups is not none %}
<select name="initial_ip_group_id" id="sidebar-ip-group-select" class="form-select" hx-swap-oob="true" onchange="handleSidebarGroupChange(this)">
  <option value="">-- 不关联分组 --</option>
  {% for group in ip_groups %}
  <option value="{{ group.id }}">{{ group.name }} (包含 {{ group.ips | length }} IP)</option>
  {% endfor %}
  <option value="__new__">➕ 新建分组...</option>
</select>
{% endif %}
