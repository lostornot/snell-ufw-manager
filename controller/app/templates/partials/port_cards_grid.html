{% if toast %}
<div class="toast-trigger hidden"
     data-message="{{ toast.message }}"
     data-type="{{ toast.type | default('success') }}">
</div>
{% endif %}

<div id="port-cards-grid" style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
  {% for port_num, data in port_data.items() %}
    {% include "partials/port_card.html" %}
  {% else %}
    <div class="empty-state" style="width: 100%; padding: 48px 24px; text-align: center; color: var(--text-muted);">
      <p>当前节点无额外放行端口规则（或 UFW 为关闭状态）</p>
    </div>
  {% endfor %}
</div>

{% if all_tags is defined and all_tags is not none %}
<select name="ip_tag_select" id="sidebar-ip-tag-select" class="form-select" hx-swap-oob="true">
  <option value="">-- 不关联标签 --</option>
  {% for tag in all_tags %}
  <option value="{{ tag }}">{{ tag }}</option>
  {% endfor %}
</select>
{% endif %}
