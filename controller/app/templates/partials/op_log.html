<!-- Operation log partial -->
{% if logs %}
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>时间</th>
        <th>操作</th>
        <th>目标</th>
        <th>详情</th>
        <th>状态</th>
      </tr>
    </thead>
    <tbody>
      {% for log in logs %}
      <tr>
        <td class="text-secondary text-sm mono">{{ log.created_at }}</td>
        <td><span class="tag tag-info">{{ log.action }}</span></td>
        <td class="mono">{{ log.target or '—' }}</td>
        <td class="text-secondary text-sm">{{ log.detail or '—' }}</td>
        <td>
          {% if log.success %}
            <span class="tag tag-allow">✓ 成功</span>
          {% else %}
            <span class="tag tag-block">✗ 失败</span>
          {% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<div class="empty-state">
  <p>暂无操作记录</p>
</div>
{% endif %}
