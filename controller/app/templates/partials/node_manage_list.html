<!-- Node manage list partial -->
{% if toast %}
<div class="toast-trigger hidden"
     data-message="{{ toast.message }}"
     data-type="{{ toast.type | default('success') }}">
</div>
{% endif %}

<div id="node-manage-list">
  {% if nodes %}
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span>🖥️</span> 已添加节点
        <span class="count">{{ nodes | length }}</span>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>IP</th>
            <th>SSH 端口</th>
            <th>Snell 端口</th>
            <th>备注</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          {% for node in nodes %}
          {% include "partials/node_row.html" %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  {% else %}
  <div class="card">
    <div class="empty-state">
      <div class="icon">🖥️</div>
      <p>还没有节点</p>
    </div>
  </div>
  {% endif %}
</div>
