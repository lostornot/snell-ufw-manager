<!-- Node manage list partial -->
{% if toast %}
<div class="toast-trigger hidden"
     data-message="{{ toast.message }}"
     data-type="{{ toast.type | default('success') }}">
</div>
{% endif %}

<div id="node-manage-list">
  {% if nodes %}
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span>🖥️</span> 已添加节点
        <span class="count">{{ nodes | length }}</span>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>IP</th>
            <th>SSH 端口</th>
            <th>Snell 端口</th>
            <th>备注</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          {% for node in nodes %}
          <tr>
            <td><strong>{{ node.name }}</strong></td>
            <td class="mono">{{ node.host }}</td>
            <td class="mono">{{ node.ssh_port }}</td>
            <td class="mono">{{ node.snell_port }}</td>
            <td class="text-secondary">{{ node.remark or '—' }}</td>
            <td>
              <div class="flex gap-2">
                <a href="/nodes/{{ node.id }}" class="btn btn-secondary btn-sm">管理 →</a>
                <button class="btn btn-secondary btn-sm"
                        hx-post="/api/nodes/{{ node.id }}/test"
                        hx-target="#toast-container"
                        hx-swap="beforeend">
                  <span class="spinner htmx-indicator"></span>
                  🔗 测试
                </button>
                <button class="btn btn-danger btn-sm"
                        hx-delete="/api/nodes/{{ node.id }}"
                        hx-target="#node-manage-list"
                        hx-swap="outerHTML"
                        hx-confirm="确定删除节点 {{ node.name }}？">
                  删除
                </button>
              </div>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  {% else %}
  <div class="card">
    <div class="empty-state">
      <div class="icon">🖥️</div>
      <p>还没有节点</p>
    </div>
  </div>
  {% endif %}
</div>
