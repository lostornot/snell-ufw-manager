<!-- Node manage list partial -->
{% if toast %}
<div class="toast-trigger hidden"
     data-message="{{ toast.message }}"
     data-type="{{ toast.type | default('success') }}">
</div>
{% endif %}

<div id="node-manage-list">
  {% if nodes %}
  <div class="glass-card" style="padding: 24px;">
    <div class="section-header" style="margin-bottom: 16px;">
      <h3 style="font-size: 1.2rem; color: var(--text-primary); display: flex; align-items: center; gap: 8px;">
        <span>🖥️</span> 已添加被控节点列表
        <span class="badge" style="background: rgba(15, 23, 42, 0.04); color: var(--text-secondary); padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: 500;">{{ nodes | length }}</span>
      </h3>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>节点名称</th>
            <th>主机 IP 地址</th>
            <th>SSH 端口</th>
            <th>默认 SNELL 端口</th>
            <th>备注说明</th>
            <th style="width: 280px;">快速操作</th>
          </tr>
        </thead>
        <tbody>
          {% for node in nodes %}
            {% include "partials/node_row.html" %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
  {% else %}
  <div class="glass-card empty-state" style="padding: 40px; text-align: center; color: var(--text-muted);">
    <div style="font-size: 2.5rem; margin-bottom: 12px;">🖥️</div>
    <p>当前未添加任何节点。</p>
  </div>
  {% endif %}
</div>
