{% extends "base.html" %}
{% set active_page = "relay_groups" %}

{% block title %}中转组管理 — Snell UFW Manager{% endblock %}

{% block content %}
<div class="page-title">
  <span class="icon">🔗</span> 中转组管理
</div>

<!-- Create New Group -->
<div class="card mb-3">
  <div class="card-title mb-2"><span>➕</span> 新建中转组</div>
  <form class="form-inline"
        hx-post="/api/relay-groups"
        hx-target="#relay-group-list"
        hx-swap="outerHTML">
    <div class="form-group" style="flex:2;">
      <input class="form-input" name="name" placeholder="组名，如：JMS S5 荷兰" required>
    </div>
    <div class="form-group" style="flex:3;">
      <input class="form-input" name="remark" placeholder="备注（可选）">
    </div>
    <button type="submit" class="btn btn-primary">
      <span class="spinner htmx-indicator"></span>
      创建
    </button>
  </form>
</div>

<!-- Group List -->
<div id="relay-group-list">
  {% include "partials/relay_group_list.html" %}
</div>
{% endblock %}
